# ══════════════════════════════════════════════════════════════════════════════
# LaborGuard — docker-compose.yml
#
# Place this file at the PROJECT ROOT:
#   LaborGuard/
#     docker-compose.yml   ← this file
#     .env                 ← copy from .env.example, fill in real values
#     backend/
#     frontend/
#
# Start everything:   docker compose up --build
# Backend only:       docker compose up --build zookeeper kafka centrifugo auth-service community-service complaint-service notification-service messaging-service job-service
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ════════════════════════════════════════
  # INFRASTRUCTURE
  # ════════════════════════════════════════

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: laborguard-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - laborguard-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: laborguard-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"     # container-to-container  (services → kafka:9092)
      - "29092:29092"   # host access             (Kafka UI / dev tools → localhost:29092)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    networks:
      - laborguard-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: laborguard-centrifugo
    ports:
      - "8000:8000"
    command: centrifugo --config=config.json
    volumes:
      - ./backend/infra/centrifugo/config.json:/centrifugo/config.json:ro
    networks:
      - laborguard-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ════════════════════════════════════════
  # MICROSERVICES
  # ════════════════════════════════════════

  auth-service:
    build:
      context: ./backend/services/auth-service    # ← was ./services/auth-service
      dockerfile: Dockerfile
    image: laborguard/auth-service:latest
    container_name: laborguard-auth-service
    ports:
      - "5001:5001"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - PORT=5001
      - SERVICE_NAME=auth-service
      - MONGODB_URI=${MONGODB_ATLAS_BASE}
      - MONGODB_DB_NAME=laborguard-auth
      - KAFKA_BROKER=kafka:9092
      - KAFKAJS_NO_PARTITIONER_WARNING=1
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - laborguard-network
    dns: [1.1.1.1, 8.8.8.8]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  community-service:
    build:
      context: ./backend/services/community-service    # ← was ./services/community-service
      dockerfile: Dockerfile
    image: laborguard/community-service:latest
    container_name: laborguard-community-service
    ports:
      - "5002:5002"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - PORT=5002
      - SERVICE_NAME=community-service
      - MONGODB_URI=${MONGODB_ATLAS_BASE}
      - MONGODB_DB_NAME=laborguard-community
      - KAFKA_BROKER=kafka:9092
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TOXICITY_THRESHOLD=0.7
      - NSFW_THRESHOLD=0.5
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - laborguard-network
    dns: [1.1.1.1, 8.8.8.8]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5002/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  complaint-service:
    build:
      context: ./backend/services/complaint-service    # ← was ./services/complaint-service
      dockerfile: Dockerfile
    image: laborguard/complaint-service:latest
    container_name: laborguard-complaint-service
    ports:
      - "5003:5003"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - PORT=5003
      - SERVICE_NAME=complaint-service
      - MONGODB_URI=${MONGODB_ATLAS_BASE}
      - MONGODB_DB_NAME=laborguard-complaint
      - KAFKA_BROKER=kafka:9092
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - laborguard-network
    dns: [1.1.1.1, 8.8.8.8]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5003/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  notification-service:
    build:
      context: ./backend/services/notification-service    # ← was ./services/notification-service
      dockerfile: Dockerfile
    image: laborguard/notification-service:latest
    container_name: laborguard-notification-service
    ports:
      - "5004:5004"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - PORT=5004
      - SERVICE_NAME=notification-service
      - MONGODB_URI=${MONGODB_ATLAS_BASE}
      - MONGODB_DB_NAME=laborguard-notification
      - KAFKA_BROKER=kafka:9092
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - SYSTEM_DEFAULT_EMAIL=${SYSTEM_DEFAULT_EMAIL}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - laborguard-network
    dns: [1.1.1.1, 8.8.8.8]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5004/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  messaging-service:
    build:
      context: ./backend/services/messaging-service    # ← was ./services/messaging-service
      dockerfile: Dockerfile
    image: laborguard/messaging-service:latest
    container_name: laborguard-messaging-service
    ports:
      - "5005:5005"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - PORT=5005
      - SERVICE_NAME=messaging-service
      - MONGODB_URI=${MONGODB_ATLAS_BASE}
      - MONGODB_DB_NAME=laborguard-messaging
      - KAFKA_BROKER=kafka:9092
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - CENTRIFUGO_API_KEY=${CENTRIFUGO_API_KEY}
      - CENTRIFUGO_API_URL=http://centrifugo:8000/api
    depends_on:
      kafka:
        condition: service_healthy
      centrifugo:
        condition: service_healthy
    networks:
      - laborguard-network
    dns: [1.1.1.1, 8.8.8.8]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5005/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  job-service:
    build:
      context: ./backend/services/job-service    # ← was ./services/job-service
      dockerfile: Dockerfile
    image: laborguard/job-service:latest
    container_name: laborguard-job-service
    ports:
      - "5006:5006"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - PORT=5006
      - SERVICE_NAME=job-service
      - MONGODB_URI=${MONGODB_ATLAS_BASE}
      - MONGODB_DB_NAME=laborguard-jobs
      - KAFKA_BROKER=kafka:9092
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - laborguard-network
    dns: [1.1.1.1, 8.8.8.8]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5006/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ════════════════════════════════════════
  # FRONTEND
  # ════════════════════════════════════════

  frontend:
    build:
      context: ./frontend    # ← was ../frontend (fragile relative path, now clean)
      dockerfile: Dockerfile
      args:
        VITE_AUTH_SERVICE_URL: ${VITE_AUTH_SERVICE_URL:-http://localhost:5001}
        VITE_COMMUNITY_SERVICE_URL: ${VITE_COMMUNITY_SERVICE_URL:-http://localhost:3002}
        VITE_COMPLAINT_SERVICE_URL: ${VITE_COMPLAINT_SERVICE_URL:-http://localhost:3003}
        VITE_NOTIFICATION_SERVICE_URL: ${VITE_NOTIFICATION_SERVICE_URL:-http://localhost:3004}
        VITE_MESSAGING_SERVICE_URL: ${VITE_MESSAGING_SERVICE_URL:-http://localhost:3005}
        VITE_JOB_SERVICE_URL: ${VITE_JOB_SERVICE_URL:-http://localhost:5003}
        VITE_CENTRIFUGO_URL: ${VITE_CENTRIFUGO_URL:-ws://localhost:8000/connection/websocket}  # ← added
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}    # ← added (frontend OAuth)
    image: laborguard/frontend:latest
    container_name: laborguard-frontend
    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_healthy
      community-service:
        condition: service_healthy
      complaint-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      messaging-service:
        condition: service_healthy
      job-service:
        condition: service_healthy
    networks:
      - laborguard-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

networks:
  laborguard-network:
    driver: bridge